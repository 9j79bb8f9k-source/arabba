<!DOCTYPE html>
<html lang="tr">
  <head>
    <title>ArabaPusula</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 40px auto;
        background-color: #f5f5f5;
        color: #333;
      }

      h2 {
        font-size: 16px;
        color: #333;
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .kart {
        background: white;
        padding: 16px;
        border-radius: 8px;
        margin-bottom: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        transition: transform 0.2s;
      }

      .kart:hover {
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>

    <header style="
      background: #185FA5;
      color: white;
      padding: 16px 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    ">
      <span style="font-size: 28px;">🚗</span>
      <div>
        <div style="font-size: 20px; font-weight: bold;">ArabaPusula</div>
        <div style="font-size: 13px; opacity: 0.8;">Türkiye'nin araba yorum platformu</div>
      </div>
    </header>

    <input type="text" placeholder="Marka veya model ara..." style="
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 16px;
      box-sizing: border-box;
    ">

    <h2>Popüler Araçlar</h2>

    <div class="kart">
      <h3><a href="corolla.html" style="color:#333; text-decoration:none;">Toyota Corolla</a></h3>
      <p style="color: #EF9F27;">★★★★☆</p>
      <p style="color: #888; font-size: 14px;">4.1 / 5 puan · 1.240 yorum</p>
    </div>

    <div class="kart">
      <h3><a href="clio.html" style="color:#333; text-decoration:none;">Renault Clio</a></h3>
      <p style="color: #EF9F27;">★★★★★</p>
      <p style="color: #888; font-size: 14px;">4.3 / 5 puan · 2.015 yorum</p>
    </div>

    <div class="kart">
      <h3><a href="passat.html" style="color:#333; text-decoration:none;">Volkswagen Passat</a></h3>
      <p style="color: #EF9F27;">★★★★☆</p>
      <p style="color: #888; font-size: 14px;">3.8 / 5 puan · 876 yorum</p>
    </div>

    <script>
      const arama = document.querySelector('input');
      const kutucuklar = document.querySelectorAll('.kart');

      arama.addEventListener('input', function() {
        const yazi = arama.value.toLowerCase();

        kutucuklar.forEach(function(kutu) {
          const isim = kutu.innerText.toLowerCase();
          if (isim.includes(yazi)) {
            kutu.style.display = 'block';
          } else {
            kutu.style.display = 'none';
          }
        });
      });
    </script>

  </body>
</html>
